<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vectra - Acesse sua conta</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="login.css">
</head>
<body>
    
    <div class="aurora-bg">
    <div class="aurora-blob blob-1"></div>
    <div class="aurora-blob blob-2"></div>
    <div class="aurora-blob blob-3"></div>
</div>

<div class="dashboard-content">
    </div>

    

    <div class="bg-lines"></div>
<div class="caixa-de-vidro-logo"></div>
<div class="logo-container">

        <img src="../image/logo_2.png" alt="Logo Vectra"
        class="logo-livre">
    
</div>



    <div class="login-card">
        <h2>Acesse sua conta</h2>
        <form action="#" method="POST" id="loginForm">

            <div class="input-group">
                <label for="email">E-mail</label>
                <div class="input-wrapper">
                    <i class="fa-regular fa-envelope icon-left"></i>
                    <input type="email" id="email" placeholder="seu@email.com" required>
                </div>
            </div>

            <div class="input-group">
                <label for="password">Senha</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-lock icon-left"></i>
                    <input type="password" id="password" placeholder="Digite sua senha" style="padding-right: 45px;" required>
                    <i class="fa-regular fa-eye icon-right" id="togglePassword"></i>
                </div>
            </div>

            

            <a href="#" id="loginBtn" class="login-btn" >Entrar</a>

            <div class="divider">
                <span>ou</span>
            </div>

            <div class="register-link">
                Ainda não tem conta? <a href="Cadastro.html">Cadastre-se</a>
            </div>
        </form>
    </div>

    <script src="../backend/login.js"></script>
    
    <script>
    // ==========================================
    // 1. PROCURA OS ELEMENTOS NA TELA (UMA SÓ VEZ)
    // ==========================================
    const togglePassword = document.getElementById('togglePassword');
    const passwordInput = document.getElementById('password');
    const loginBtn = document.getElementById('loginBtn');
    const emailInput = document.getElementById('email');

    // ==========================================
    // 2. FUNCIONALIDADE DO OLHO (MOSTRAR/OCULTAR)
    // ==========================================
    if (togglePassword && passwordInput) {
        togglePassword.addEventListener('click', function () {
            const tipoAtual = passwordInput.getAttribute('type');
            const novoTipo = tipoAtual === 'password' ? 'text' : 'password';
            
            passwordInput.setAttribute('type', novoTipo);
            
            this.classList.toggle('fa-eye');
            this.classList.toggle('fa-eye-slash');
        });
    }

    // ==========================================
    // 3. FUNCIONALIDADE DE LOGIN DE TESTE
    // ==========================================
    if (loginBtn && emailInput && passwordInput) {
        loginBtn.addEventListener('click', function (evento) {
            evento.preventDefault(); // Impede recarregar a página

            const emailDigitado = emailInput.value;
            const senhaDigitada = passwordInput.value;

            if (emailDigitado === 'admin@gmail.com' && senhaDigitada === '123abc') {
                window.location.href = 'Tela principal/painel_principal.html'; // Sucesso! Vai para o painel
            } else {
                alert('E-mail ou senha incorretos. Tente novamente!'); // Erro!
            }
        });
    }
</script>


    
    
</body>
</html>
